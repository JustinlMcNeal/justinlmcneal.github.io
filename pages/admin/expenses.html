<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#f58f86" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/imgs/icons/apple-touch-icon.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="/imgs/icons/favicon-32x32.png" />
  <title>Admin · Expenses</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            kkpink: '#ff69b4',
          }
        }
      }
    }
  </script>

  <!-- KK base + components -->
  <link rel="stylesheet" href="/css/theme/base.css">
  <link rel="stylesheet" href="/css/theme/components.css">

  <style>
    .custom-scrollbar::-webkit-scrollbar { height: 8px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #000; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #333; }
    .expense-row:hover { background: #fafafa; }
    .expense-row:hover .row-actions { opacity: 1; }
    .row-actions { opacity: 0.5; transition: opacity 0.15s; }
    @media (max-width: 640px) {
      button, [role="button"] { min-height: 44px; }
      input, select, textarea { font-size: 16px !important; }
    }
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
</head>

<body class="kk-page kk-admin bg-gray-50 min-h-screen">
  <!-- Admin Nav mount -->
  <div id="kkAdminNavMount"></div>

  <main class="max-w-7xl mx-auto px-2 sm:px-6 py-4 sm:py-8">

    <!-- Header Card -->
    <header class="bg-white rounded-2xl shadow-sm border border-gray-200 p-4 sm:p-6 mb-4 sm:mb-6">
      <div class="flex flex-col sm:flex-row sm:items-end justify-between gap-4">
        <div>
          <div class="inline-block bg-black text-white px-2 py-1 text-[10px] font-black uppercase tracking-[.25em] mb-2">
            Admin Panel
          </div>
          <h1 class="text-2xl sm:text-4xl font-black tracking-tight">
            Expenses
          </h1>
          <p class="text-xs sm:text-sm text-gray-500 mt-1">
            Track business expenses, purchases, and operating costs
          </p>
        </div>
        <div class="flex gap-2 self-start sm:self-auto flex-wrap">
          <button id="btnImportInvoices" type="button"
            class="border-4 border-black bg-white text-black px-5 py-2.5 font-black uppercase tracking-[.12em] text-xs
                   hover:bg-gray-100 transition-all">
            📋 Import
          </button>
          <button id="btnImportEbay" type="button"
            class="border-4 border-black bg-white text-black px-5 py-2.5 font-black uppercase tracking-[.12em] text-xs
                   hover:bg-gray-100 transition-all drop-zone"
            title="Click or drag-and-drop an eBay Transaction Report CSV">
            🏷️ eBay
          </button>
          <button id="btnImportAmazon" type="button"
            class="border-4 border-black bg-white text-black px-5 py-2.5 font-black uppercase tracking-[.12em] text-xs
                   hover:bg-gray-100 transition-all drop-zone"
            title="Click or drag-and-drop an Amazon Transactions CSV">
            📦 Amazon
          </button>
          <button id="btnImportGitHub" type="button"
            class="border-4 border-black bg-white text-black px-5 py-2.5 font-black uppercase tracking-[.12em] text-xs
                   hover:bg-gray-100 transition-all">
            🐙 GitHub
          </button>
          <button id="btnAddExpense" type="button"
            class="border-4 border-black bg-black text-white px-5 py-2.5 font-black uppercase tracking-[.12em] text-xs
                   hover:bg-kkpink hover:border-kkpink hover:text-black transition-all">
            + Add Expense
          </button>
        </div>
      </div>

    </header>

    <!-- KPI Cards -->
    <section class="grid grid-cols-2 lg:grid-cols-5 gap-3 sm:gap-4 mb-4 sm:mb-6">
      <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-3 sm:p-4">
        <div class="text-[9px] sm:text-[10px] font-black uppercase tracking-[.18em] text-gray-500 mb-1">Total Spent</div>
        <div id="kpiTotalSpent" class="text-lg sm:text-2xl font-black">$0.00</div>
      </div>
      <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-3 sm:p-4">
        <div class="text-[9px] sm:text-[10px] font-black uppercase tracking-[.18em] text-gray-500 mb-1">This Month</div>
        <div id="kpiThisMonth" class="text-lg sm:text-2xl font-black">$0.00</div>
      </div>
      <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-3 sm:p-4">
        <div class="text-[9px] sm:text-[10px] font-black uppercase tracking-[.18em] text-gray-500 mb-1">Entries</div>
        <div id="kpiCount" class="text-lg sm:text-2xl font-black">0</div>
      </div>
      <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-3 sm:p-4">
        <div class="text-[9px] sm:text-[10px] font-black uppercase tracking-[.18em] text-gray-500 mb-1">Top Category</div>
        <div id="kpiTopCategory" class="text-lg sm:text-2xl font-black truncate">—</div>
      </div>
      <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-3 sm:p-4">
        <div class="text-[9px] sm:text-[10px] font-black uppercase tracking-[.18em] text-gray-500 mb-1">Total Miles</div>
        <div id="kpiTotalMiles" class="text-lg sm:text-2xl font-black">0</div>
      </div>
    </section>

    <!-- Quick links to billing pages -->
    <div class="flex flex-wrap items-center gap-x-4 gap-y-1 mb-4 sm:mb-6 px-1">
      <span class="text-[9px] font-black uppercase tracking-[.18em] text-gray-400">Billing links</span>
      <a href="https://github.com/account/billing/history" target="_blank" rel="noopener"
        class="text-[11px] font-bold text-gray-500 hover:text-black underline decoration-dotted underline-offset-2 transition-colors">
        🐙 GitHub
      </a>
      <a href="https://www.ebay.com/mes/report-landing?sh=true" target="_blank" rel="noopener"
        class="text-[11px] font-bold text-gray-500 hover:text-black underline decoration-dotted underline-offset-2 transition-colors">
        🏷️ eBay
      </a>
      <a href="https://sellercentral.amazon.com/payments/event/view?type=Transactions" target="_blank" rel="noopener"
        class="text-[11px] font-bold text-gray-500 hover:text-black underline decoration-dotted underline-offset-2 transition-colors">
        📦 Amazon
      </a>
      <a href="https://platform.openai.com/settings/organization/billing/overview" target="_blank" rel="noopener"
        class="text-[11px] font-bold text-gray-500 hover:text-black underline decoration-dotted underline-offset-2 transition-colors">
        🤖 OpenAI
      </a>
    </div>

    <!-- Search & Filters -->
    <section class="bg-white rounded-2xl shadow-sm border border-gray-200 p-3 sm:p-4 mb-4 sm:mb-6">
      <div class="flex flex-col sm:flex-row gap-3 sm:gap-4 items-stretch sm:items-end flex-wrap">
        <!-- Search -->
        <div class="flex-1 min-w-[180px]">
          <label for="searchExpense"
                 class="block text-[9px] sm:text-[10px] font-black uppercase tracking-[.18em] mb-1 sm:mb-2 text-gray-500">
            Search
          </label>
          <div class="relative">
            <input
              id="searchExpense"
              type="text"
              placeholder="Description, vendor, category..."
              class="w-full border-4 border-black px-3 sm:px-4 py-2 sm:py-3 text-sm outline-none pr-10 focus:border-kkpink transition-colors"
            />
            <!-- Magnifier: visible when empty -->
            <svg id="expenseSearchIcon" class="absolute right-3 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
            </svg>
            <!-- Clear button: visible when typing -->
            <button
              id="expenseSearchClear"
              type="button"
              aria-label="Clear search"
              class="absolute right-2 top-1/2 -translate-y-1/2 hidden w-6 h-6 flex items-center justify-center text-gray-400 hover:text-black transition-colors text-lg font-black leading-none"
            >&times;</button>
          </div>
        </div>

        <!-- Category Filter -->
        <div class="w-full sm:w-48">
          <label for="filterCategory"
                 class="block text-[9px] sm:text-[10px] font-black uppercase tracking-[.18em] mb-1 sm:mb-2 text-gray-500">
            Category
          </label>
          <select id="filterCategory" class="w-full border-4 border-black px-3 py-2 sm:py-3 text-sm outline-none bg-white focus:border-kkpink transition-colors">
            <option value="">All Categories</option>
            <option value="Inventory">Inventory (COGS)</option>
            <option value="Supplies">Supplies (Packaging)</option>
            <option value="Advertising">Advertising</option>
            <option value="Platform Fees">Platform Fees</option>
            <option value="Shipping">Shipping</option>
            <option value="Software">Software</option>
            <option value="Website / Hosting">Website / Hosting</option>
            <option value="Office">Office</option>
            <option value="Phone / Internet">Phone / Internet</option>
            <option value="Travel / Meals">Travel / Meals</option>
            <option value="Professional Fees">Professional Fees</option>
            <option value="Bank Fees">Bank Fees</option>
            <option value="Vehicle">Vehicle</option>
            <option value="Mileage">Mileage</option>
            <option value="Other">Other</option>
          </select>
        </div>

        <!-- Vendor Filter -->
        <div class="w-full sm:w-44">
          <label for="filterVendor"
                 class="block text-[9px] sm:text-[10px] font-black uppercase tracking-[.18em] mb-1 sm:mb-2 text-gray-500">
            Vendor
          </label>
          <select id="filterVendor" class="w-full border-4 border-black px-3 py-2 sm:py-3 text-sm outline-none bg-white focus:border-kkpink transition-colors">
            <option value="">All Vendors</option>
          </select>
        </div>

        <!-- Date From -->
        <div class="w-full sm:w-40">
          <label for="filterDateFrom"
                 class="block text-[9px] sm:text-[10px] font-black uppercase tracking-[.18em] mb-1 sm:mb-2 text-gray-500">
            From
          </label>
          <input id="filterDateFrom" type="date"
            class="w-full border-4 border-black px-3 py-2 sm:py-3 text-sm outline-none bg-white focus:border-kkpink transition-colors" />
        </div>

        <!-- Date To -->
        <div class="w-full sm:w-40">
          <label for="filterDateTo"
                 class="block text-[9px] sm:text-[10px] font-black uppercase tracking-[.18em] mb-1 sm:mb-2 text-gray-500">
            To
          </label>
          <input id="filterDateTo" type="date"
            class="w-full border-4 border-black px-3 py-2 sm:py-3 text-sm outline-none bg-white focus:border-kkpink transition-colors" />
        </div>

        <!-- Sort -->
        <div class="w-full sm:w-44">
          <label for="sortBy"
                 class="block text-[9px] sm:text-[10px] font-black uppercase tracking-[.18em] mb-1 sm:mb-2 text-gray-500">
            Sort By
          </label>
          <select id="sortBy" class="w-full border-4 border-black px-3 py-2 sm:py-3 text-sm outline-none bg-white focus:border-kkpink transition-colors">
            <option value="date_desc">Newest First</option>
            <option value="date_asc">Oldest First</option>
            <option value="amount_desc">Highest Amount</option>
            <option value="amount_asc">Lowest Amount</option>
            <option value="category">Category</option>
          </select>
        </div>

        <!-- Count -->
        <div class="flex items-center justify-between sm:justify-end gap-3">
          <div class="text-xs sm:text-sm font-bold uppercase tracking-wider text-gray-500" id="expenseCount">
            0 expenses
          </div>
        </div>
      </div>
      <div id="status" class="text-xs text-gray-400 mt-2"></div>
    </section>

    <!-- Charts Panel -->
    <section id="chartsPanel" class="grid grid-cols-1 lg:grid-cols-2 gap-4 sm:gap-6 mb-4 sm:mb-6">
      <!-- Spending by Category (doughnut) -->
      <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-4 sm:p-6">
        <h2 class="text-[10px] font-black uppercase tracking-[.18em] text-gray-500 mb-3">Spending by Category</h2>
        <div class="relative" style="max-height:320px;">
          <canvas id="chartCategory"></canvas>
        </div>
      </div>
      <!-- Monthly Spending (bar) -->
      <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-4 sm:p-6">
        <h2 class="text-[10px] font-black uppercase tracking-[.18em] text-gray-500 mb-3">Monthly Spending</h2>
        <div class="relative" style="max-height:320px;">
          <canvas id="chartMonthly"></canvas>
        </div>
      </div>
    </section>

    <!-- Platform Breakdown KPI Row -->
    <section id="platformKpis" class="grid grid-cols-2 sm:grid-cols-4 gap-3 sm:gap-4 mb-4 sm:mb-6">
    </section>

    <!-- Table -->
    <section id="tableWrap" class="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
      <!-- Mobile Card View -->
      <div id="mobileExpenseCards" class="sm:hidden"></div>

      <!-- Desktop Table View -->
      <div class="hidden sm:block overflow-x-auto custom-scrollbar">
        <table class="w-full border-collapse text-sm" id="expensesTable">
          <thead class="bg-black text-white">
            <tr class="text-left uppercase tracking-[.12em] text-[11px] font-black">
              <th class="px-4 py-4">Date</th>
              <th class="px-4 py-4">Category</th>
              <th class="px-4 py-4">Description</th>
              <th class="px-4 py-4 text-right">Amount</th>
              <th class="px-4 py-4 text-right">Miles</th>
              <th class="px-4 py-4">Vendor</th>
              <th class="px-4 py-4 text-right">Actions</th>
            </tr>
          </thead>
          <tbody id="expensesRows" class="divide-y divide-gray-200"></tbody>
        </table>
      </div>

      <!-- Empty State -->
      <div id="emptyState" class="hidden p-8 text-center">
        <div class="text-4xl mb-3">💸</div>
        <div class="text-gray-500 text-sm">No expenses found</div>
      </div>

      <!-- Load More -->
      <div class="p-4 border-t border-gray-200 flex items-center justify-between">
        <div id="loadMoreStatus" class="text-xs text-gray-500"></div>
        <button id="btnLoadMore" type="button"
          class="border-4 border-black bg-white text-black px-4 py-2 font-black uppercase tracking-[.12em] text-xs
                 hover:bg-black hover:text-white transition-all">
          Load More
        </button>
      </div>
    </section>

  </main>

  <!-- EXPENSE MODAL -->
  <div id="expenseModal" class="hidden fixed inset-0 z-[200]" aria-hidden="true">
    <!-- Backdrop -->
    <div id="expenseModalBackdrop" class="absolute inset-0 bg-black/60 backdrop-blur-sm"></div>

    <!-- Stage -->
    <div class="relative h-full w-full overflow-y-auto">
      <div class="min-h-full flex items-end sm:items-center justify-center p-0 sm:p-6">
        <!-- Card -->
        <div class="w-full sm:max-w-lg bg-white border-0 sm:border-4 border-black shadow-none sm:shadow-[8px_8px_0_0_rgba(0,0,0,0.1)] min-h-screen sm:min-h-0">
          <!-- Head -->
          <div class="sticky top-0 z-10 flex items-center justify-between gap-3 p-3 sm:p-5 border-b-4 border-black bg-white">
            <div class="min-w-0">
              <div class="inline-block bg-red-500 text-white px-2 py-0.5 text-[8px] sm:text-[9px] font-black uppercase tracking-[.2em] mb-1">
                Expense
              </div>
              <h3 id="modalTitle" class="text-lg sm:text-2xl font-black tracking-tight truncate">
                Add Expense
              </h3>
            </div>

            <button
              id="btnCloseExpense"
              type="button"
              class="border-4 border-black bg-white w-10 h-10 flex items-center justify-center font-black text-lg
                     hover:bg-black hover:text-white transition-colors flex-shrink-0"
              aria-label="Close"
            >
              ✕
            </button>
          </div>

          <!-- Body -->
          <div class="p-3 sm:p-6 space-y-5 pb-24 sm:pb-6">
            <!-- Message -->
            <div id="modalMsg" class="hidden p-3 border-4 border-red-300 bg-red-50 text-red-700 text-sm"></div>

            <!-- Date -->
            <div>
              <label for="fDate" class="block text-[11px] font-black uppercase tracking-[.12em] mb-1 text-black/70">
                Date
              </label>
              <input id="fDate" type="date"
                class="w-full border-[4px] border-black px-3 py-2 text-sm outline-none focus:border-kkpink transition-colors" />
            </div>

            <!-- Category -->
            <div>
              <label for="fCategory" class="block text-[11px] font-black uppercase tracking-[.12em] mb-1 text-black/70">
                Category
              </label>
              <select id="fCategory"
                class="w-full border-[4px] border-black px-3 py-2 text-sm outline-none bg-white focus:border-kkpink transition-colors">
                <option value="">Select category…</option>
                <option value="Inventory">Inventory (COGS)</option>
                <option value="Supplies">Supplies (Packaging)</option>
                <option value="Advertising">Advertising</option>
                <option value="Platform Fees">Platform Fees</option>
                <option value="Shipping">Shipping</option>
                <option value="Software">Software</option>
                <option value="Website / Hosting">Website / Hosting</option>
                <option value="Office">Office</option>
                <option value="Phone / Internet">Phone / Internet</option>
                <option value="Travel / Meals">Travel / Meals</option>
                <option value="Professional Fees">Professional Fees</option>
                <option value="Bank Fees">Bank Fees</option>
                <option value="Vehicle">Vehicle</option>
                <option value="Mileage">Mileage</option>
                <option value="Other">Other</option>
              </select>
            </div>

            <!-- Mileage Fields (shown when category = Mileage) -->
            <div id="mileageFields" class="hidden space-y-4 p-4 border-4 border-dashed border-orange-300 bg-orange-50 rounded-lg">
              <div class="flex items-center gap-2 mb-1">
                <span class="text-lg">🚗</span>
                <span class="text-[11px] font-black uppercase tracking-[.12em] text-orange-700">Mileage Entry</span>
              </div>
              <div class="grid grid-cols-2 gap-4">
                <div>
                  <label for="fMiles" class="block text-[11px] font-black uppercase tracking-[.12em] mb-1 text-black/70">
                    Miles Driven
                  </label>
                  <input id="fMiles" type="number" step="0.1" min="0" placeholder="0.0"
                    class="w-full border-[4px] border-black px-3 py-2 text-sm outline-none focus:border-kkpink transition-colors" />
                </div>
                <div>
                  <label for="fMileageRate" class="block text-[11px] font-black uppercase tracking-[.12em] mb-1 text-black/70">
                    Rate ($/mile)
                  </label>
                  <input id="fMileageRate" type="number" step="0.005" min="0" placeholder="0.70"
                    class="w-full border-[4px] border-black px-3 py-2 text-sm outline-none focus:border-kkpink transition-colors" />
                </div>
              </div>
              <div class="text-xs text-orange-700">
                <span class="font-bold">Calculated amount:</span>
                <span id="mileageCalcPreview" class="font-black">$0.00</span>
                <span class="text-orange-500 ml-1">(2025 IRS rate: $0.70/mile)</span>
              </div>
            </div>

            <!-- Description -->
            <div>
              <label for="fDescription" class="block text-[11px] font-black uppercase tracking-[.12em] mb-1 text-black/70">
                Description
              </label>
              <input id="fDescription" type="text" placeholder="e.g. Shipping Tools, Etsy Ad…"
                class="w-full border-[4px] border-black px-3 py-2 text-sm outline-none focus:border-kkpink transition-colors" />
            </div>

            <!-- Amount -->
            <div>
              <label for="fAmount" class="block text-[11px] font-black uppercase tracking-[.12em] mb-1 text-black/70">
                Amount ($)
              </label>
              <input id="fAmount" type="number" step="0.01" min="0" placeholder="0.00"
                class="w-full border-[4px] border-black px-3 py-2 text-sm outline-none focus:border-kkpink transition-colors" />
            </div>

            <!-- Vendor -->
            <div>
              <label for="fVendor" class="block text-[11px] font-black uppercase tracking-[.12em] mb-1 text-black/70">
                Vendor / Source
              </label>
              <input id="fVendor" type="text" placeholder="e.g. Amazon, Baestoa…"
                class="w-full border-[4px] border-black px-3 py-2 text-sm outline-none focus:border-kkpink transition-colors" />
            </div>

            <!-- Notes -->
            <div>
              <label for="fNotes" class="block text-[11px] font-black uppercase tracking-[.12em] mb-1 text-black/70">
                Notes (optional)
              </label>
              <textarea id="fNotes" rows="2" placeholder="Any additional details…"
                class="w-full border-[4px] border-black px-3 py-2 text-sm outline-none focus:border-kkpink transition-colors resize-y"></textarea>
            </div>
          </div>

          <!-- Foot -->
          <div class="sticky bottom-0 flex items-center justify-between gap-3 p-3 sm:p-5 border-t-4 border-black bg-gray-50">
            <button
              id="btnDeleteExpense"
              type="button"
              class="hidden border-4 border-red-500 bg-white text-red-600 px-4 py-2 font-black uppercase tracking-[.12em] text-xs
                     hover:bg-red-500 hover:text-white transition-all">
              Delete
            </button>
            <div class="flex items-center gap-3 ml-auto">
              <button
                id="btnCancelExpense"
                type="button"
                class="border-4 border-black bg-white text-black px-4 py-2 font-black uppercase tracking-[.12em] text-xs
                       hover:bg-gray-100 transition-all">
                Cancel
              </button>
              <button
                id="btnSaveExpense"
                type="button"
                class="border-4 border-black bg-black text-white px-6 py-2 font-black uppercase tracking-[.12em] text-xs
                       hover:bg-kkpink hover:border-kkpink hover:text-black transition-all">
                Save
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Footer mount -->
  <div id="kkFooterMount"></div>

  <!-- IMPORT INVOICES MODAL -->
  <div id="importModal" class="hidden fixed inset-0 z-[200]" aria-hidden="true">
    <div id="importModalBackdrop" class="absolute inset-0 bg-black/60 backdrop-blur-sm"></div>
    <div class="relative h-full w-full overflow-y-auto">
      <div class="min-h-full flex items-end sm:items-center justify-center p-0 sm:p-6">
        <div class="w-full sm:max-w-2xl bg-white border-0 sm:border-4 border-black shadow-none sm:shadow-[8px_8px_0_0_rgba(0,0,0,0.1)] min-h-screen sm:min-h-0">
          <!-- Head -->
          <div class="sticky top-0 z-10 flex items-center justify-between gap-3 p-3 sm:p-5 border-b-4 border-black bg-white">
            <div class="min-w-0">
              <div class="inline-block bg-indigo-500 text-white px-2 py-0.5 text-[8px] sm:text-[9px] font-black uppercase tracking-[.2em] mb-1">
                Import
              </div>
              <h3 class="text-lg sm:text-2xl font-black tracking-tight truncate">
                Import API Invoices
              </h3>
            </div>
            <button id="btnCloseImport" type="button"
              class="border-4 border-black bg-white w-10 h-10 flex items-center justify-center font-black text-lg
