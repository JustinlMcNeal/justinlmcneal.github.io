<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#f58f86" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/imgs/icons/apple-touch-icon.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="/imgs/icons/favicon-32x32.png" />
  <title>Coupon · Karry Kraze</title>
  <meta name="description" content="Reveal your Karry Kraze coupon code and shop the latest accessories." />
  <link rel="canonical" href="https://karrykraze.com/pages/coupon.html" />

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/theme/base.css">
  <link rel="stylesheet" href="/css/theme/components.css">
  <script src="/js/shared/metaPixel.js"></script>
</head>

<body class="kk-page bg-[#fafafa] min-h-screen flex flex-col text-black">
  <div id="kkNavbarMount"></div>

  <main class="flex-1 px-4 py-10 sm:py-14">
    <section class="max-w-5xl mx-auto grid lg:grid-cols-[1.05fr_.95fr] gap-8 lg:gap-10 items-center">
      <div class="order-2 lg:order-1">
        <div class="uppercase tracking-[.25em] font-black text-xs text-black/50 mb-3">Karry Kraze Coupon</div>
        <h1 id="couponTitle" class="font-black tracking-tight text-4xl sm:text-5xl leading-tight">Your offer is loading</h1>
        <p id="couponDescription" class="mt-4 text-base sm:text-lg text-black/60 max-w-xl">
          Hang tight while we pull up your coupon.
        </p>

        <div id="couponPanel" class="mt-8 border-[4px] border-black bg-white p-5 sm:p-6 shadow-[10px_10px_0_#000] max-w-xl">
          <div class="text-xs uppercase tracking-[.2em] font-black text-black/50">Your Code</div>
          <div class="mt-3 flex flex-col sm:flex-row gap-3 sm:items-stretch">
            <div id="couponCode" class="flex-1 border-[3px] border-black bg-[#fff7fb] px-4 py-4 font-mono font-black text-2xl sm:text-3xl tracking-wide text-center sm:text-left select-all">
              LOADING
            </div>
            <button id="btnCopy" type="button" class="border-[3px] border-black bg-black text-white px-5 py-3 font-black uppercase tracking-[.12em] text-xs hover:bg-white hover:text-black transition-colors">
              Copy
            </button>
          </div>
          <p id="copyMsg" class="hidden mt-3 text-sm font-bold text-green-700">Copied to clipboard.</p>
          <dl id="couponDetails" class="mt-5 grid sm:grid-cols-2 lg:grid-cols-4 gap-3 text-sm"></dl>
        </div>

        <div id="couponActions" class="mt-8 flex flex-col sm:flex-row gap-3 max-w-xl">
          <a href="/pages/catalog.html" class="inline-flex items-center justify-center border-[4px] border-black bg-black text-white px-6 py-4 font-black uppercase tracking-[.12em] text-sm hover:bg-white hover:text-black transition-colors">
            Shop Now
          </a>
          <a href="/pages/checkout.html" class="inline-flex items-center justify-center border-[4px] border-black bg-white px-6 py-4 font-black uppercase tracking-[.12em] text-sm hover:bg-black hover:text-white transition-colors">
            Go To Checkout
          </a>
        </div>
      </div>

      <div id="couponVisual" class="order-1 lg:order-2">
        <div class="aspect-[4/5] border-[4px] border-black bg-white overflow-hidden shadow-[10px_10px_0_#000]">
          <img id="couponImage" src="/imgs/brand/placeholder.png" alt="Karry Kraze promotion" class="w-full h-full object-cover" />
        </div>
      </div>
    </section>

    <section id="couponError" class="hidden max-w-xl mx-auto mt-10 border-[4px] border-black bg-white p-6 text-center">
      <h2 class="font-black text-2xl">Coupon Not Available</h2>
      <p id="couponErrorText" class="mt-2 text-black/60">This coupon could not be found or is no longer active.</p>
      <a href="/pages/catalog.html" class="inline-flex mt-5 border-[4px] border-black bg-black text-white px-5 py-3 font-black uppercase tracking-[.12em] text-xs hover:bg-white hover:text-black transition-colors">
        Browse Products
      </a>
    </section>
  </main>

  <div id="kkFooterMount"></div>

  <script type="module" src="/js/coupon/index.js"></script>
  <script type="module" src="/js/shared/pwa.js"></script>
</body>
</html>
