<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#f58f86" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/imgs/icons/apple-touch-icon.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="/imgs/icons/favicon-32x32.png" />
  <title>Reviews · Karry Kraze</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { kkpink: '#ff69b4', kkpeach: '#f6dcc6' }
        }
      }
    }
  </script>

  <link rel="stylesheet" href="/css/theme/base.css">
  <link rel="stylesheet" href="/css/theme/components.css">

  <style>
    @keyframes slide-up { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
    .slide-up { animation: slide-up .4s ease-out forwards; }
  </style>
</head>

<body class="kk-page bg-gray-50 min-h-screen flex flex-col">
  <div id="kkNavbarMount"></div>

  <main class="flex-1 px-4 py-8 sm:py-12">
    <div class="max-w-3xl mx-auto">

      <!-- Hero Section -->
      <div class="text-center mb-10">
        <div class="inline-block bg-black text-white px-3 py-1 text-[10px] font-black uppercase tracking-[.25em] mb-3">
          Customer Reviews
        </div>
        <h1 class="text-3xl sm:text-4xl font-black tracking-tight">What Our Customers Say</h1>
        <p class="text-gray-500 text-sm mt-2">Real reviews from verified buyers</p>

        <!-- Aggregate Stats -->
        <div id="aggregateStats" class="hidden mt-6 inline-flex items-center gap-4 bg-white border-4 border-black px-6 py-4 shadow-[4px_4px_0_0_rgba(0,0,0,.08)]">
          <div class="text-4xl font-black" id="avgRating">—</div>
          <div class="text-left">
            <div id="avgStars" class="flex gap-0.5 text-amber-400"></div>
            <div class="text-xs text-gray-500 mt-0.5"><span id="totalCount">0</span> verified reviews</div>
          </div>
        </div>
      </div>

      <!-- Photo Gallery Strip -->
      <div id="photoGallery" class="hidden mb-8">
        <div class="text-[10px] font-black uppercase tracking-widest text-black/40 mb-2">Customer Photos</div>
        <div id="photoStrip" class="flex gap-2 overflow-x-auto pb-2
                    [&::-webkit-scrollbar]:h-[4px]
                    [&::-webkit-scrollbar-track]:bg-gray-100
                    [&::-webkit-scrollbar-thumb]:bg-black/30"
             style="scrollbar-width: thin; scrollbar-color: rgba(0,0,0,0.3) #f3f4f6;">
        </div>
      </div>

      <!-- Filter / Sort Bar -->
      <div class="flex flex-wrap items-center gap-3 mb-6">
        <!-- Star Filter -->
        <div class="flex gap-1.5 flex-wrap">
          <button data-filter="all" class="review-filter-btn border-2 border-black bg-black text-white px-3 py-1 text-[10px] font-black uppercase">All</button>
          <button data-filter="5" class="review-filter-btn border-2 border-black bg-white text-black px-3 py-1 text-[10px] font-black uppercase">5★</button>
          <button data-filter="4" class="review-filter-btn border-2 border-black bg-white text-black px-3 py-1 text-[10px] font-black uppercase">4★</button>
          <button data-filter="3" class="review-filter-btn border-2 border-black bg-white text-black px-3 py-1 text-[10px] font-black uppercase">3★</button>
          <button data-filter="2" class="review-filter-btn border-2 border-black bg-white text-black px-3 py-1 text-[10px] font-black uppercase">2★</button>
          <button data-filter="1" class="review-filter-btn border-2 border-black bg-white text-black px-3 py-1 text-[10px] font-black uppercase">1★</button>
        </div>

        <!-- Sort -->
        <select id="reviewSort" class="ml-auto border-2 border-black px-2 py-1 text-[10px] font-black uppercase bg-white outline-none cursor-pointer">
          <option value="newest">Newest</option>
          <option value="highest">Highest Rated</option>
          <option value="lowest">Lowest Rated</option>
        </select>
      </div>

      <!-- Search by Product -->
      <div class="mb-6">
        <input id="reviewSearch" type="search" placeholder="Search by product name…"
          class="w-full border-2 border-black/20 px-4 py-2.5 text-sm outline-none focus:border-black transition-colors bg-white"
          style="font-size: 16px;" />
      </div>

      <!-- Reviews Feed -->
      <div id="reviewsFeed" class="space-y-4">
        <div class="text-center text-sm text-gray-400 py-8">Loading reviews…</div>
      </div>

      <!-- Load More -->
      <div id="loadMoreWrap" class="hidden mt-8 text-center">
        <button id="btnLoadMore"
          class="border-2 border-black px-8 py-3 text-xs font-black uppercase tracking-wider hover:bg-black hover:text-white transition-all">
          Load More Reviews
        </button>
      </div>

      <!-- CTA Banner -->
      <div class="mt-12 bg-white border-4 border-black p-6 sm:p-8 text-center shadow-[6px_6px_0_0_rgba(0,0,0,.08)]">
        <div class="text-2xl mb-2">💖</div>
        <h2 class="text-xl font-black tracking-tight mb-2">Love your purchase?</h2>
        <p class="text-sm text-gray-500 mb-4">Share your experience and get a reward coupon!</p>
        <a href="/pages/leave-review.html"
          class="inline-block border-4 border-black bg-black text-white px-6 py-3 font-black uppercase tracking-[.12em] text-sm
                 hover:bg-kkpink hover:border-kkpink hover:text-black transition-all">
          Leave a Review
        </a>
      </div>

    </div>
  </main>

  <!-- Photo Lightbox -->
  <div id="reviewPhotoLightbox" class="fixed inset-0 z-[9999] hidden items-center justify-center bg-black/80 backdrop-blur-sm">
    <button class="absolute top-4 right-4 w-10 h-10 flex items-center justify-center bg-white/20 hover:bg-white/40 rounded-full text-white text-xl font-bold transition-colors z-10" id="lightboxClose">&times;</button>
    <img id="lightboxImg" src="" alt="Review photo" class="max-w-[90vw] max-h-[85vh] object-contain rounded-lg shadow-2xl" />
  </div>

  <div id="kkFooterMount"></div>

  <script type="module" src="/js/reviews/browse.js"></script>
  <script type="module" src="/js/shared/pwa.js"></script>
</body>
</html>
