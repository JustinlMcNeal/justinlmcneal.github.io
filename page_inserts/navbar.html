<!-- KARRY KRAZE NAVBAR (Tailwind-only) -->
<!-- Page top padding (replaces .kk-page { padding-top: 76px; }) -->
<div class="h-[76px]"></div>

<header data-kk-nav class="fixed top-0 left-0 right-0 z-[80] bg-transparent pointer-events-none">
  <div class="max-w-6xl mx-auto px-4 py-[14px] grid grid-cols-[1fr_auto_1fr] items-center gap-3 pointer-events-auto">

    <!-- MENU -->
    <button
      class="justify-self-start bg-transparent border-0 p-0 cursor-pointer font-black uppercase tracking-[.14em] text-[12px] hover:underline
             focus:outline-none focus-visible:outline-[4px] focus-visible:outline-offset-[4px] focus-visible:outline-[#f58f86]"
      type="button"
      data-kk-open="menu"
      aria-label="Open menu"
    >
      MENU
    </button>

    <!-- LOGO -->
    <a class="justify-self-center" href="/index.html" aria-label="Karry Kraze Home">
      <span class="inline-flex items-center px-[10px] py-[6px] border-[4px] border-black bg-white/30 backdrop-blur-[10px]">
        <!-- NOTE: make this root-absolute so your path rewriter can fix it on github pages -->
        <img src="/imgs/brand/logo-bwp.png" alt="Karry Kraze" class="h-[34px] block" />
      </span>
    </a>

    <!-- CART (we'll hide on admin pages via JS) -->
    <button
      class="justify-self-end bg-transparent border-0 p-0 cursor-pointer font-black uppercase tracking-[.14em] text-[12px] hover:underline
             focus:outline-none focus-visible:outline-[4px] focus-visible:outline-offset-[4px] focus-visible:outline-[#f58f86]"
      type="button"
      data-kk-open="cart"
      aria-label="Open cart"
      data-kk-cart-trigger
    >
      CART
      <span
        class="inline-flex items-center justify-center min-w-[22px] h-[22px] ml-2 border-[3px] border-black bg-white text-[11px] font-black"
        data-kk-cart-count
      >0</span>
    </button>
  </div>
</header>

<!-- Overlay -->
<div
  data-kk-overlay
  hidden
  class="fixed inset-0 z-[90] bg-black/35 backdrop-blur-[6px]"
></div>

<!-- MENU DRAWER -->
<aside
  data-kk-drawer="menu"
  aria-hidden="true"
  class="fixed top-0 bottom-0 left-0 z-[100] w-[min(420px,92vw)] bg-white border-[4px] border-black
         -translate-x-[110%] transition-transform duration-200 ease-out flex flex-col"
>
  <div class="p-4 border-b-2 border-black/15 flex items-center justify-between">
    <div class="font-black uppercase tracking-[.14em]">MENU</div>
    <button
      class="w-11 h-11 border-[4px] border-black bg-white font-black hover:bg-black hover:text-white"
      type="button"
      data-kk-close
      aria-label="Close menu"
    >✕</button>
  </div>

  <nav class="p-4 overflow-auto flex-1">
    <!-- Public -->
    <a class="block px-3 py-[14px] border-[4px] border-black mb-3 font-black uppercase tracking-[.14em] hover:bg-black hover:text-white"
       href="/pages/catalog.html">Shop</a>
    <a class="block px-3 py-[14px] border-[4px] border-black mb-3 font-black uppercase tracking-[.14em] hover:bg-black hover:text-white"
       href="/pages/reviews.html">Reviews</a>
    <a class="block px-3 py-[14px] border-[4px] border-black mb-3 font-black uppercase tracking-[.14em] hover:bg-black hover:text-white"
       href="/pages/faq.html">FAQ</a>
    <a class="block px-3 py-[14px] border-[4px] border-black mb-3 font-black uppercase tracking-[.14em] hover:bg-black hover:text-white"
       href="/pages/contact.html">Contact</a>

    <!-- Admin-only -->
    <div class="kk-admin-only hidden">
      <div class="border-t-2 border-black/15 my-4"></div>

      <a class="kk-drawer-link" href="/pages/admin/index.html">Admin · Home</a>


      <button
        id="btnLogout"
        class="hidden w-full border-[4px] border-black bg-white px-4 py-3 font-black uppercase tracking-[.14em] text-[12px]
               hover:bg-black hover:text-white"
        type="button"
      >
        Logout
      </button>
    </div>
  </nav>
</aside>

<!-- CART DRAWER -->
<aside
  data-kk-drawer="cart"
  aria-hidden="true"
  class="fixed top-0 bottom-0 right-0 z-[100] w-[min(420px,92vw)] bg-white border-[4px] border-black
         translate-x-[110%] transition-transform duration-200 ease-out flex flex-col"
>
  <div class="p-4 border-b-2 border-black/15 flex items-center justify-between">
    <div class="font-black uppercase tracking-[.14em]">CART</div>
    <button
      class="w-11 h-11 border-[4px] border-black bg-white font-black hover:bg-black hover:text-white"
      type="button"
      data-kk-close
      aria-label="Close cart"
    >✕</button>
  </div>

  <div class="p-4 overflow-auto flex-1">
    <div data-kk-cart-items></div>

    <div class="mt-4 border-t-2 border-black/15 pt-4">
      <!-- Coupon UI area (keep your ids) -->
      <div class="mb-4 pb-4 border-b-2 border-black/15">
        <label class="block font-black text-[11px] tracking-[.12em] uppercase mb-2">
          Coupon Code
        </label>

        <div class="flex gap-2">
          <input
            type="text"
            id="kk-coupon-input"
            placeholder="Enter code"
            class="flex-1 border-[4px] border-black px-3 py-[10px] text-[14px] uppercase"
          />
          <button
            id="kk-coupon-apply"
            class="border-[4px] border-black bg-black text-white px-4 py-[10px] font-black tracking-[.12em] uppercase text-[11px]"
          >
            APPLY
          </button>
        </div>

        <div id="kk-coupon-message" class="mt-2 text-[12px] hidden"></div>
      </div>

      <!-- Subtotal -->
      <div class="flex justify-between items-baseline mb-3 font-black">
        <span>Subtotal</span>
        <span data-kk-cart-subtotal>$0.00</span>
      </div>

      <!-- Auto promotions -->
      <div id="cart-promotions"></div>

      <!-- Coupon discount -->
      <div id="cart-coupon-discount" class="hidden flex justify-between items-baseline mb-3 font-black">
        <span class="opacity-90 truncate">Coupon</span>
        <span class="font-black text-green-600 whitespace-nowrap">-$0.00</span>
      </div>

      <hr class="my-4 border-black/15" />

      <!-- Total -->
      <div class="flex justify-between items-baseline mb-3 font-black text-[18px]">
        <span>Total</span>
        <span id="cart-total">$0.00</span>
      </div>

      <button
        class="w-full border-[4px] border-black bg-black text-white px-4 py-3 font-black uppercase tracking-[.14em] text-[12px]"
        type="button"
        data-kk-checkout
      >
        Checkout
      </button>

      <div class="mt-2 text-[12px] text-black/60">
        Shipping + tax calculated at checkout.
      </div>
    </div>
  </div>
</aside>
